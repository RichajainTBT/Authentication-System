<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentecation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <section class="login-section">
        <div class="container">
            <!-- toast message -->
            <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-2">
                <div id="toast" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body">
                            Hello, world! This is a toast message.
                        </div>
                        <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"
                            aria-label="Close"><i class="bi bi-x"></i></button>
                    </div>
                </div>
            </div>
            
            <!-- toast message -->
            <div class="login-wrapper">
                <div class="login-card card shadow">
                    <div class="row">
                        <div class="col-lg-6 col-md-12">
                            <div class="card-body authentecation-sec-body">
                                <!-- login section -->
                                <div id="login-sec">
                                     <!-- <button onclick="showToast('bg-success', 'login successful !!')">Show Toast</button> -->
                                    <h1 class="heading">Login</h1>
                                    <form name="login">
                                        <div class="mb-2">
                                            <label for="login_email">Email</label>
                                            <input type="email" id="login_email" class="form-control" name="email"
                                                value="" placeholder="Enter your Email">
                                            <span class="error" aria-live="polite"></span>
                                        </div>
                                        <div class="mb-2">
                                            <label for="login_password">Password</label>
                                            <div class="password-field">
                                                <input type="password" id="login_password" class="form-control"
                                                    name="password" value="" placeholder="Enter your Password">
                                                <span class="error" aria-live="polite"></span>
                                                <button type="button" class="hideShowPassword"
                                                    aria-label="hide-password"><i class="bi bi-eye-slash"></i></button>
                                            </div>
                                        </div>
                                        <div class="link right-align">
                                            <button type="button" class="forgot-link">Forgot Password ?</button>
                                        </div>
                                        <button type="submit" class="btn btn-theme mt-2 mb-2">Login</button>
                                        <div class="link text-center">
                                            <button type="button" class="register-link"> Not a member Click to
                                                <b>Register</b> ?</button>
                                        </div>
                                    </form>
                                </div>
                                <!-- login-section -->
                                <!-- register section -->
                                <div id="register-sec">
                                    <h1 class="heading">Register</h1>
                                    <form name="register">
                                        <div class="mb-2">
                                            <label for="user_name">Name</label>
                                            <input type="text" id="user_name" class="form-control" name="name" value=""
                                                placeholder="Enter your Name" required>
                                            <span class="error" aria-live="polite"></span>
                                        </div>
                                        <div class="mb-2">
                                            <label for="reg_email">Email</label>
                                            <input type="email" id="reg_email" class="form-control" name="email"
                                                value="" placeholder="Enter your Email" required>
                                            <span class="error" aria-live="polite"></span>
                                        </div>
                                        <div class="mb-2">
                                            <label for="reg_new_password">Password</label>
                                            <div class="password-field">
                                                <input type="password" id="reg_new_password" class="form-control"
                                                    name="password" value="" placeholder="Enter your Password" required>
                                                <span class="error" aria-live="polite"></span>
                                                <button type="button" class="hideShowPassword"
                                                    aria-label="hide-password"><i class="bi bi-eye-slash"></i></button>
                                            </div>
                                        </div>
                                        <div class="mb-2">
                                            <label for="reg_confirm_password">Confirm Password</label>
                                            <div class="password-field">
                                                <input type="password" id="reg_confirm_password" class="form-control"
                                                    name="confirm_password" value="" placeholder="Enter Confirm Password" required>
                                                <span class="error" aria-live="polite"></span>
                                                <button type="button" class="hideShowPassword"
                                                    aria-label="hide-password"><i class="bi bi-eye-slash"></i></button>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-theme mt-2 mb-2">Register</button>
                                        <div class="link text-center">
                                            <button type="button" class="login-link"> Already a member Click to
                                                <b>Login</b> ?</button>
                                        </div>
                                    </form>
                                </div>
                                <!-- register section -->
                                <!-- forgot section -->
                                <div id="forgot-sec">
                                    <h1 class="heading">Forgot Password</h1>
                                    <form name="forgot" novalidate>
                                        <div class="mb-2">
                                            <label for="for_email">Email</label>
                                            <input type="email" id="for_email" class="form-control" name="email"
                                                value="" placeholder="Enter your Email" required>
                                            <span class="error" aria-live="polite"></span>
                                        </div>
                                        <div id="update-password">
                                            <div class="mb-2">
                                                <label for="for_new_password">New Password</label>
                                                <div class="password-field">
                                                    <input type="password" id="for_new_password" class="form-control"
                                                        name="password" value="" placeholder="Enter your Password" required>
                                                    <span class="error" aria-live="polite"></span>
                                                        <button type="button" class="hideShowPassword"
                                                        aria-label="hide-password"><i
                                                            class="bi bi-eye-slash"></i></button>
                                                </div>
                                            </div>
                                            <div class="mb-2">
                                                <label for="for_confirm_password">Confirm Password</label>
                                                <div class="password-field">
                                                    <input type="password" id="for_confirm_password"
                                                        class="form-control" name="confirm_password" value=""
                                                        placeholder="Enter Confirm Password" required>
                                                    <span class="error" aria-live="polite"></span>
                                                    <button type="button" class="hideShowPassword"
                                                        aria-label="hide-password"><i
                                                            class="bi bi-eye-slash"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-theme mt-2 mb-2">Submit</button>
                                    </form>
                                    <div class="link text-center">
                                        <button type="button" class="login-link"> Back to <b>Login</b> ?</button>
                                        <button type="button" class="register-link">Not a member click to
                                            <b>Register</b> ?</button>
                                    </div>
                                </div>
                                <!-- forgot section -->
                            </div>
                        </div>
                        <div class="col-lg-6 d-none d-lg-block">
                            <img src="img/login-sec.avif" class="w-100 login-right-sec-img">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="main.js"></script>
    <script>
         window.addEventListener("DOMContentLoaded", ()=>{
            let user = JSON.parse(localStorage.getItem("currentUser"))
            if(user){
                window.location.href ="dashboard.html"
            }
         })
    </script>
</body>

</html>
