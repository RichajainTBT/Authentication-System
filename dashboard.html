<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentecation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="style.css" rel="stylesheet">
</head>
<body>
   <section class="pt-4 pb-4">
     <div class="container">
        <div class="row justify-content-center align-items-center" style="height:100vh">
            <div class="col-md-4">
                 <div class="card card-body shadow-sm text-center p-4">
                    <div class="user-profile">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <h4>Welcome to <span id="userName">Richa jain</span></h4>
                    <p>Id: <span id="userId">12</span></p>
                    <p>Email is : <span id="email">user@gmail.com</span></p>
                    <button class="btn btn-theme" id="logout"><i class="bi bi-box-arrow-left"></i> &nbsp; Logout</button>
                </div>
            </div>
        </div>
     </div>
   </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script>
        window.addEventListener("DOMContentLoaded", ()=>{
            let user = JSON.parse(localStorage.getItem("currentUser"))
            if(!user){
                window.location.href ="login.html"
            }
            else{
                 document.querySelector("#userId").innerText =user.id;
                document.querySelector("#userName").innerText =user.name;
                document.querySelector("#email").innerText =user.email;
            }
        })
        let logout = document.querySelector("#logout");
        logout.addEventListener("click", ()=>{
            localStorage.removeItem("currentUser");
            window.location.href = "index.html";
        })
    </script>
</body>
</html>
